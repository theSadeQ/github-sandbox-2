name: Download from Commit Message

on:
  push:
    branches:
      - main

# 1. FIX: Explicitly grant write permissions so `git push` doesn't fail with 128
permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget aria2 zip bc
          
          wget -q --show-progress https://github.com/Y2Z/monolith/releases/download/v2.8.3/monolith-gnu-linux-x86_64 -O monolith
          chmod +x monolith
          sudo mv monolith /usr/local/bin/

      - name: Parse and Download
        run: |
          set -euo pipefail
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          printf "Commit message:\n%s\n" "$COMMIT_MSG"
          
          URLS=$(printf '%s\n' "$COMMIT_MSG" | grep -Eo 'https?://[^[:space:]"'\''<>]+' || true)
          
          if [ -z "$URLS" ]; then
            echo "No URLs found in commit message"
            exit 0 
          fi
          
          mkdir -p downloads
          
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            
            url=$(printf '%s\n' "$url" | sed -E 's/[.,;)]+$//')
            printf "\nProcessing: %s\n" "$url"
            
            if printf '%s\n' "$url" | grep -qE '\.(zip|tar|gz|pdf|exe|dmg|apk|jpg|png|mp4|mp3)([?]|$)'; then
              echo "Downloading file..."
              wget -P downloads/ "$url" || aria2c --parameterized-uri=false -d downloads/ "$url" || echo "Download failed"
            else
              echo "Archiving webpage..."
              FILENAME=$(printf '%s\n' "$url" | sed -E 's|https?://||' | sed 's|[^a-zA-Z0-9]|_|g')
              FILENAME=${FILENAME:0:200} 
              monolith "$url" -o "downloads/${FILENAME}.html" || echo "Archive failed"
            fi
          done <<< "$URLS"

      - name: Commit downloads
        run: |
          # Enforce error handling
          set -euo pipefail
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Add the directory. If it doesn't exist or is empty, Git ignores it safely.
          mkdir -p downloads
          git add downloads/
          
          # 3. FIX: Use git diff to check if files were actually staged
          # --quiet means exit with 1 if there are differences, 0 if no differences
          if ! git diff --cached --quiet; then
            echo "Changes detected, committing..."
            git commit -m "Add downloaded files from commit"
            
            # Push explicitly to the current branch to avoid detached HEAD issues
            git push origin HEAD:${GITHUB_REF}
          else
            echo "No new files were downloaded or changed. Skipping commit."
          fi
