name: Auto-Download from Commit Message

on:
  push:
    # This triggers the workflow on any push to any branch.

permissions:
  # Crucial: Gives the runner permission to push the downloaded files back
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Ensures we have the commit history to read the message

      # 2. Install aria2 and monolith
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y aria2
          
          # Install monolith manually from GitHub releases since it's not in apt
          wget https://github.com/Y2Z/monolith/releases/latest/download/monolith-gnu-linux-x86_64 -O monolith
          chmod +x monolith
          sudo mv monolith /usr/local/bin/

      # 3. Parse commit message and download
      - name: Parse and Download
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euxo pipefail

          # Extract URLs using grep. 
          # '|| true' ensures the script doesn't crash if no URLs are found.
          urls=$(echo "$COMMIT_MESSAGE" | grep -Eo 'https?://[^ ]+' || true)

          if [ -z "$urls" ]; then
            echo "No URLs found in the commit message. Exiting."
            exit 0
          fi

          # Process each URL safely using a Here-String
          while IFS= read -r url; do
            # Skip empty lines
            [ -z "$url" ] && continue

            # Strip trailing punctuation (like periods or commas)
            clean_url=$(echo "$url" | sed 's/[.,;]*$//')
            echo "Processing: $clean_url"

            # Check if it's an HTML page/directory or a general file
            if [[ "$clean_url" == *.html || "$clean_url" == *.htm || "$clean_url" == */ ]]; then
              echo "Detected webpage. Using monolith..."
              # Create a safe filename, truncate to 50 chars to prevent OS filename limits
              safe_name=$(echo "$clean_url" | sed -e 's/[^A-Za-z0-9._-]/_/g' | cut -c 1-50)
              
              # '|| echo ...' prevents a single failed download from failing the whole job
              monolith "$clean_url" -o "${safe_name}.html" || echo "::warning::Monolith failed on $clean_url"
            else
              echo "Detected file. Using aria2c..."
              # --parameterized-uri=false prevents Exit Code 2 on complex URLs
              aria2c --parameterized-uri=false "$clean_url" || echo "::warning::aria2c failed on $clean_url"
            fi
          done <<< "$urls"

      # 4. Save the files to the repo
      - name: Commit downloads
        run: |
          set -euxo pipefail
          
          # Set up the bot's Git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # PREVENT GITHUB 100MB LIMIT ERROR:
          # Find files over 95MB (excluding the hidden .git folder) and remove them
          find . -type f -size +95M ! -path "./.git/*" | while read -r large_file; do
            echo "::warning::File '$large_file' is too large for GitHub (>95MB). Skipping commit."
            rm "$large_file"
          done
          
          # Stage the newly downloaded files (large ones are now removed)
          git add .
          
          # Check if there are actually any changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-downloaded files from commit URLs"
            
            # Pull with rebase to synchronize the branch before pushing
            git pull --rebase origin ${GITHUB_REF_NAME}
            
            # Push changes to the branch that triggered the action
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No new downloaded files to commit."
          fi
