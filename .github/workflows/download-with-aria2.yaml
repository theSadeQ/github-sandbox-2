      - name: Commit downloads
        run: |
          set -euxo pipefail
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ensure directory exists so git add doesn't fail
          mkdir -p downloads
          git add downloads/
          
          # FIX 1: Use git status --porcelain. It outputs an empty string if nothing changed.
          # This is the safest way to check for changes in CI/CD pipelines.
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected, committing..."
            git commit -m "Add offline webpage archives"
            
            # FIX 2: Pull with rebase before pushing.
            # If the server has newer commits, this safely stacks your new downloads
            # on top of them, preventing the Exit Code 1 push rejection.
            git pull --rebase origin ${GITHUB_REF_NAME}
            
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No new files were downloaded or changed. Skipping commit."
          fi
