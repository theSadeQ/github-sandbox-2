name: Download from Commit Message

on:
  push:
    branches:
      - main

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget aria2 zip bc
          
          # Install monolith safely
          wget -q --show-progress https://github.com/Y2Z/monolith/releases/download/v2.8.3/monolith-gnu-linux-x86_64 -O monolith
          chmod +x monolith
          sudo mv monolith /usr/local/bin/

      - name: Parse and Download
        run: |
          set -euo pipefail
          
          # 1. Safely extract commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          printf "Commit message:\n%s\n" "$COMMIT_MSG"
          
          # 2. Extract URLs securely
          URLS=$(printf '%s\n' "$COMMIT_MSG" | grep -Eo 'https?://[^[:space:]"'\''<>]+' || true)
          
          if [ -z "$URLS" ]; then
            echo "No URLs found in commit message"
            exit 0
          fi
          
          mkdir -p downloads
          
          # 3. Process URLs via Here-String
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            
            url=$(printf '%s\n' "$url" | sed -E 's/[.,;)]+$//')
            printf "\nProcessing: %s\n" "$url"
            
            if printf '%s\n' "$url" | grep -qE '\.(zip|tar|gz|pdf|exe|dmg|apk|jpg|png|mp4|mp3)([?]|$)'; then
              echo "Downloading file..."
              wget -P downloads/ "$url" || aria2c --parameterized-uri=false -d downloads/ "$url" || echo "Download failed: $url"
            else
              echo "Archiving webpage..."
              FILENAME=$(printf '%s\n' "$url" | sed -E 's|https?://||' | sed 's|[^a-zA-Z0-9]|_|g')
              FILENAME=${FILENAME:0:200} 
              monolith "$url" -o "downloads/${FILENAME}.html" || echo "Archive failed: $url"
            fi
          done <<< "$URLS"

      # NEW APPROACH: Upload as Artifact instead of Git Commit
      - name: Upload Downloads as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: commit-downloads
          path: downloads/
          if-no-files-found: ignore
          retention-days: 30
