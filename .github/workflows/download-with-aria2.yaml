name: Auto Download on Commit Command

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 wget zip
          
          # Install monolith for proper web archiving
          wget -q https://github.com/Y2Z/monolith/releases/download/v2.8.3/monolith-gnu-linux-x86_64 -O /tmp/monolith
          sudo install /tmp/monolith /usr/local/bin/

      - name: Parse commit message and download
        run: |
          set -u  # Only fail on undefined variables, not command failures

          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "=== Commit message ==="
          echo "$COMMIT_MSG"
          echo "======================"

          if ! echo "$COMMIT_MSG" | grep -qE '(download:|download-zip:)'; then
            echo "No download command found. Exiting gracefully."
            exit 0
          fi

          MODE="normal"
          if echo "$COMMIT_MSG" | grep -q 'download-zip:'; then
            MODE="zip"
          fi
          echo "Mode: $MODE"

          # Extract URLs more safely
          URLS=$(echo "$COMMIT_MSG" | grep -oP '(?<=download(-zip)?:\s).*' | tr ' ' '\n' | grep -E '^https?://')

          if [ -z "$URLS" ]; then
            echo "No valid URLs detected. Exiting."
            exit 0
          fi

          echo "=== URLs to download ==="
          echo "$URLS"
          echo "========================"

          rm -rf tmp_downloads
          mkdir -p tmp_downloads downloads

          cd tmp_downloads

          for URL in $URLS; do
            echo "Processing: $URL"

            # Check if it's a direct file
            if [[ "$URL" =~ \.(jpg|jpeg|png|gif|mp4|mp3|pdf|zip|tar|gz|rar|7z|exe|iso|doc|docx|xls|xlsx|ppt|pptx|apk|dmg)$ ]]; then
              echo "  → Direct file download"
              aria2c -x 8 -s 8 "$URL" || wget -c "$URL" || echo "Failed to download $URL"
            else
              echo "  → Web page archive"
              DOMAIN=$(echo "$URL" | sed -E 's|https?://([^/]+).*|\1|' | tr '.' '_')
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              OUTPUT="${DOMAIN}_${TIMESTAMP}.html"
              
              monolith "$URL" -o "$OUTPUT" || echo "Failed to archive $URL"
            fi
          done

          cd ..

          # Check if anything was downloaded
          if [ ! -d "tmp_downloads" ] || [ -z "$(ls -A tmp_downloads 2>/dev/null)" ]; then
            echo "Nothing was downloaded successfully. Exiting."
            exit 0
          fi

          LIMIT=$((90*1024*1024))

          if [ "$MODE" = "zip" ]; then
            NAME="download_$(date +%Y%m%d_%H%M%S)"
            zip -r "${NAME}.zip" tmp_downloads

            SIZE=$(stat -c%s "${NAME}.zip")
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Archive exceeds 90MB, splitting..."
              rm "${NAME}.zip"
              cd tmp_downloads
              zip -s 90m -r "../downloads/${NAME}.zip" .
              cd ..
            else
              mv "${NAME}.zip" downloads/
            fi
          else
            # Normal download mode
            find tmp_downloads -type f | while read FILE; do
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")

              if [ "$SIZE" -gt "$LIMIT" ]; then
                echo "File $BASENAME exceed
