name: Auto Download on Commit Command

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 wget zip bc
          
          # Install monolith
          wget -q https://github.com/Y2Z/monolith/releases/download/v2.8.3/monolith-gnu-linux-x86_64 -O /tmp/monolith
          chmod +x /tmp/monolith
          sudo mv /tmp/monolith /usr/local/bin/monolith
          
          # Verify installation
          if ! command -v monolith &> /dev/null; then
            echo "❌ monolith installation failed"
            exit 1
          fi
          echo "✅ monolith installed: $(monolith --version)"

      - name: Parse and Download
        run: |
          set -u
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "::group::Commit Message"
          echo "$COMMIT_MSG"
          echo "::endgroup::"

          MODE="none"
          if echo "$COMMIT_MSG" | grep -q 'download-zip:'; then
            MODE="zip"
          elif echo "$COMMIT_MSG" | grep -q 'download:'; then
            MODE="normal"
          fi

          if [ "$MODE" = "none" ]; then
            echo "ℹ️  No download command found"
            exit 0
          fi

          echo "Mode: $MODE"

          URLS=$(echo "$COMMIT_MSG" | sed -n 's/.*download\(-zip\)\{0,1\}:\s*//p' | tr ' ' '\n' | grep -E '^https?://' || true)

          if [ -z "$URLS" ]; then
            echo "ℹ️  No valid URLs found"
            exit 0
          fi

          echo "::group::URLs"
          echo "$URLS"
          echo "::endgroup::"

          mkdir -p tmp_downloads downloads
          SUCCESS=0
          FAIL=0

          for URL in $URLS; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📥 $URL"

            # Check if direct file
            if echo "$URL" | grep -qiE '\.(jpg|jpeg|png|gif|webp|mp4|mp3|pdf|zip|tar|gz|rar|7z|exe|iso|doc|docx|xls|xlsx|ppt|pptx|apk|dmg|svg|bmp|wav|flac|mkv|avi|mov|bin|deb|rpm)$'; then
              echo "   Type: Direct file"
              if aria2c -x 8 -s 8 -d tmp_downloads "$URL" 2>&1 | tail -5; then
                echo "   ✅ Downloaded (aria2c)"
                SUCCESS=$((SUCCESS+1))
              elif wget -q -P tmp_downloads "$URL"; then
                echo "   ✅ Downloaded (wget)"
                SUCCESS=$((SUCCESS+1))
              else
                echo "   ❌ Failed"
                FAIL=$((FAIL+1))
              fi
            else
              # Web page
              echo "   Type: Web page (archiving with monolith)"
              DOMAIN=$(echo "$URL" | sed -E 's|https?://([^/]+).*|\1|' | tr '.' '_' | tr '/' '_')
              STAMP=$(date +%Y%m%d_%H%M%S)
              OUTFILE="tmp_downloads/${DOMAIN}_${STAMP}.html"

              if monolith "$URL" -o "$OUTFILE" -I -j -s 2>&1 | tail -5; then
                if [ -f "$OUTFILE" ]; then
                  SIZE=$(stat -c%s "$OUTFILE")
                  SIZE_MB=$(echo "scale=2; $SIZE/1024/1024" | bc)
                  echo "   ✅ Archived: $OUTFILE ($SIZE_MB MB)"
                  SUCCESS=$((SUCCESS+1))
                else
                  echo "   ❌ File not created"
                  FAIL=$((FAIL+1))
                fi
              else
                echo "   ❌ monolith failed"
                rm -f "$OUTFILE"
                FAIL=$((FAIL+1))
              fi
            fi
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Results: $SUCCESS succeeded, $FAIL failed"

          FILE_COUNT=$(find tmp
