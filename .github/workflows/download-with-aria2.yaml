name: Archive Webpages & Split Large Files
on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  archive-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euo pipefail
          # Install zip to ensure we can split files, and wget for downloading monolith
          sudo apt-get update
          sudo apt-get install -y wget zip unzip
          
          # Install monolith binary
          wget -qO monolith https://github.com/Y2Z/monolith/releases/download/v2.8.1/monolith-gnu-linux-x86_64
          chmod +x monolith
          sudo mv monolith /usr/local/bin/
          monolith --version

      - name: Parse, Download, and Split
        run: |
          set -euo pipefail
          
          # Extract commit message
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"
          
          # Safely extract URLs starting with http:// or https://
          # Using grep -E instead of grep -P to avoid UTF-8 Exit Code 2 errors
          URLS=$(echo "$MSG" | grep -Eo 'https?://[^[:space:]"'\''<>]+' || true)
          
          if [ -z "$URLS" ]; then
            echo "❌ No URLs found in the commit message."
            exit 0
          fi
          
          # Create temporary processing dir and final output dir
          mkdir -p tmp_downloads downloads
          
          # 1. DOWNLOAD PHASE
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            
            # Strip trailing punctuation for cleaner links
            clean_url=$(echo "$url" | sed -E 's/[.,;)]+$//')
            
            # Create a safe filename (replace weird characters with underscores)
            safe_name=$(echo "$clean_url" | sed -E 's/[^a-zA-Z0-9]/_/g')
            # Truncate to 150 chars to avoid OS "File name too long" errors
            filename="${safe_name:0:150}.html"
            
            echo "⬇️ Archiving: $clean_url"
            
            # Run monolith. 
            # Removed -i to KEEP images. 
            # -f (no iframes/ads), -v (no videos), -a (no audio)
            monolith -f -v -a "$clean_url" -o "tmp_downloads/$filename" || echo "::warning::Failed to archive $clean_url"
          done <<< "$URLS"
          
          # 2. SPLIT PHASE
          for FILE in tmp_downloads/*; do
            # Skip if no files exist
            [ -f "$FILE" ] || continue
            
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024)) # 90 MB in bytes
            BASENAME=$(basename "$FILE")
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — larger than 90MB. Splitting with zip..."
              
              # zip -s creates: file.zip, file.z01, file.z02, etc.
              # -j removes the 'tmp_downloads/' folder structure from inside the zip
              zip -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
              
              echo "✅ Created Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              echo "✅ $BASENAME is $(( SIZE / 1024 / 1024 ))MB. No splitting needed."
              cp "$FILE" "downloads/$BASENAME"
            fi
          done
          
          # Clean up the temporary heavy files
          rm -rf tmp_downloads

      - name: Commit and Push
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the contents of the downloads folder
          git add downloads/
          
          # Check if there are actually files to commit to prevent errors
          if git diff --cached --quiet; then
            echo "No new downloads to commit."
          else
            git commit -m "Add downloaded files from commit [skip ci]"
            echo "🚀 Pushing to branch: $BRANCH"
            git pull --rebase origin $BRANCH
            git push origin HEAD:$BRANCH
          fi
