name: Auto Download on Commit Command

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 wget zip
      
      - name: Parse commit message and download
        run: |
          set -e
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          if [[ ! "$COMMIT_MSG" =~ (download:|download-zip:) ]]; then
            echo "No download command found"
            exit 0
          fi
          
          MODE="normal"
          if [[ "$COMMIT_MSG" =~ download-zip: ]]; then
            MODE="zip"
            echo "Mode: download and zip"
          else
            echo "Mode: normal download"
          fi
          
          URLS=$(echo "$COMMIT_MSG" | grep -oP '(download(-zip)?:)\s*\K.*' || true)
          
          if [ -z "$URLS" ]; then
            echo "No URLs found"
            exit 0
          fi
          
          echo "URLs: $URLS"
          
          mkdir -p tmp_downloads downloads
          cd tmp_downloads
          
          for URL in $URLS; do
            echo "Processing: $URL"
            
            if [[ "$URL" =~ \.(jpg|jpeg|png|gif|mp4|mp3|pdf|zip|tar|gz|rar|7z|exe|dmg|iso|doc|docx|xls|xlsx|ppt|pptx)$ ]]; then
              echo "Downloading file with aria2c"
              aria2c -x 16 -s 16 "$URL" || wget -c "$URL"
            else
              echo "Downloading webpage with wget"
              wget --page-requisites --convert-links --adjust-extension \
                   --span-hosts --no-parent --restrict-file-names=windows \
                   -e robots=off "$URL"
            fi
          done
          
          cd ..
          
          if [ "$MODE" = "zip" ]; then
            echo "Creating zip archive"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            ARCHIVE_NAME="download_${TIMESTAMP}"
            
            cd tmp_downloads
            zip -r "../${ARCHIVE_NAME}.zip" .
            cd ..
            
            FILESIZE=$(stat -c%s "${ARCHIVE_NAME}.zip" 2>/dev/null || stat -f%z "${ARCHIVE_NAME}.zip")
            FILESIZE_MB=$((FILESIZE / 1024 / 1024))
            
            echo "Archive size: ${FILESIZE_MB}MB"
            
            if [ $FILESIZE_MB -gt 90 ]; then
              echo "Splitting archive (>90MB)"
              rm "${ARCHIVE_NAME}.zip"
              cd tmp_downloads
              zip -s 90m -r "../downloads/${ARCHIVE_NAME}.zip" .
              cd ..
            else
              mv "${ARCHIVE_NAME}.zip" downloads/
            fi
          else
            echo "Moving files individually"
            find tmp_downloads -type f | while read -r file; do
              FILESIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              FILESIZE_MB=$((FILESIZE / 1024 / 1024))
              BASENAME=$(basename "$file")
              
              if [ $FILESIZE_MB -gt 90 ]; then
                echo "Splitting $BASENAME (${FILESIZE_MB}MB)"
                TMPDIR=$(mktemp -d)
                cp "$file" "$TMPDIR/"
                cd "$TMPDIR"
                zip -s 90m "${BASENAME}.zip" "$BASENAME"
                mv *.zip "$GITHUB_WORKSPACE/downloads/"
                cd "$GITHUB_WORKSPACE"
                rm -rf "$TMPDIR"
              else
                mv "$file" downloads/
              fi
            done
          fi
      
      - name: Commit downloaded files
        run: |
          set -e
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add downloads
          
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
