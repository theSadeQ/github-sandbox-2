name: Download from Commit & Save to Repo

on:
  push:
    branches:
      - "**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 wget zip

      - name: Parse commit and download
        run: |
          set -e

          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          MODE=""
          URLS=""

          if echo "$MSG" | grep -q "download-zip:"; then
            MODE="zip"
            URLS=$(echo "$MSG" | sed -n 's/.*download-zip:[[:space:]]*//p')
          elif echo "$MSG" | grep -q "download:"; then
            MODE="normal"
            URLS=$(echo "$MSG" | sed -n 's/.*download:[[:space:]]*//p')
          else
            echo "No download command found"
            exit 0
          fi

          mkdir -p tmp_downloads downloads

          for URL in $URLS; do
            echo "Downloading: $URL"

            if [[ "$URL" =~ \.(jpg|jpeg|png|gif|webp|mp4|zip|pdf|mp3|tar|gz|7z)$ ]]; then
              aria2c -d tmp_downloads "$URL"
            else
              wget \
                --page-requisites \
                --convert-links \
                --no-parent \
                -P tmp_downloads \
                "$URL"
            fi
          done

          if [ "$MODE" = "zip" ]; then
            ZIP="downloads/archive_$(date +%s).zip"
            zip -r "$ZIP" tmp_downloads/*
          else
            cp -r tmp_downloads/* downloads/ || true
          fi

          LIMIT=$((90 * 1024 * 1024))

          for FILE in downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Splitting $FILE"
              zip -s 90m "${FILE}.zip" "$FILE"
              rm "$FILE"
            fi
          done

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/

          git commit -m "Add downloaded files [skip ci]" || echo "Nothing to commit"

          git push
