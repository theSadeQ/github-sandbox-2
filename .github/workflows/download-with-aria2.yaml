name: Webpage Screenshot Archiver

on:
  push:
    paths-ignore:
      - '**/*.png'
      - '**/*.zip'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Create Archiver Script
        run: |
          cat << 'EOF' > archiver.js
          const { chromium } = require('playwright');

          (async () => {
            const url = process.argv[2];
            // Create a safe file name from the URL
            const safeName = url.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const outputPath = `${safeName}.png`;

            const browser = await chromium.launch();
            const page = await browser.newPage();

            // Set a standard desktop resolution to ensure a good layout
            await page.setViewportSize({ width: 1920, height: 1080 });

            try {
              console.log(`Navigating to ${url}...`);
              // Using 'load' instead of 'networkidle' to prevent timeouts!
              await page.goto(url, { waitUntil: 'load', timeout: 60000 });

              console.log('Scrolling down to trigger lazy-loaded movie posters...');
              await page.evaluate(async () => {
                await new Promise((resolve) => {
                  let totalHeight = 0;
                  const distance = 300;
                  const timer = setInterval(() => {
                    const scrollHeight = document.body.scrollHeight;
                    window.scrollBy(0, distance);
                    totalHeight += distance;
                    
                    if (totalHeight >= scrollHeight) {
                      clearInterval(timer);
                      resolve();
                    }
                  }, 200); // Scrolldown speed
                });
              });

              // Wait 2 extra seconds after scrolling finishes
              // Why? Because downloading the image is one thing, but the browser 
              // needs a fraction of a second to 'paint' it onto the screen.
              console.log('Waiting for final images to render...');
              await page.waitForTimeout(2000); 

              console.log(`Taking full-page screenshot...`);
              // fullPage: true tells Playwright to capture the entire scrollable height
              await page.screenshot({ path: outputPath, fullPage: true });
              console.log(`Successfully saved screenshot to ${outputPath}`);
              
            } catch (err) {
              console.error(`Error processing ${url}:`, err);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Extract URLs and Run Playwright
        run: |
          # Extract URLs from the commit message
          URLS=$(git log -1 --pretty=%B | grep -Eo "(http|https)://[a-zA-Z0-9./?=_%:-]*")
          
          if [ -z "$URLS" ]; then
            echo "No URLs found in the commit message."
            exit 0
          fi

          for URL in $URLS; do
            echo "Processing URL: $URL"
            node archiver.js "$URL"
          done

      - name: Handle Large Files (Split files > 90MB)
        run: |
          # GitHub has a strict 100MB file size limit. 
          # Full-page screenshots of very long lists can sometimes exceed this.
          find . -name "*.png" -size +90M | while read FILE; do
            echo "Splitting large file: $FILE"
            zip -s 90m "${FILE}.zip" "$FILE"
            rm "$FILE" # Remove the original massive file to prevent GitHub rejection
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clean up temporary Node files before committing
          rm -f archiver.js package.json package-lock.json
          rm -rf node_modules
          
          git add .
          
          # Check if there are any changes to commit
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            # [skip ci] is crucial! It stops this commit from triggering the workflow again.
            git commit -m "Add screenshot archive for extracted URLs [skip ci]"
            git push
          fi
